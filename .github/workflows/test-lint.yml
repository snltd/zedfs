name: Lint Tests
permissions:
  contents: read
on: 
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: test-lint
  cancel-in-progress: true

jobs:
  typo-checks:
    name: Typo Checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false
      - name: Check for Typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # 1.48.0
